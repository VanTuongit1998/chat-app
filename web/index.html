<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zalo Chat</title>
  <style>
    :root {
      --primary: #0084ff;
      --bg: #f1f4f8;
      --surface: #ffffff;
      --surface-strong: #e5efff;
      --text: #1f2c3d;
      --muted: #64748b;
      --border: #d2d8e0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eaf1fc 0%, #f4f7fb 100%);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
      gap: 1rem;
      padding: 1rem;
    }

    .sidebar,
    .chat-panel {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .sidebar-header div {
      line-height: 1.2;
    }

    .sidebar-header .title {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .sidebar-header .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .chat-list {
      flex: 1;
      padding: 0.75rem;
      overflow-y: auto;
    }

    .chat-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
      border-radius: 16px;
      transition: background 0.2s ease;
      cursor: pointer;
    }

    .chat-card:hover {
      background: rgba(0, 132, 255, 0.08);
    }

    .chat-card.active {
      background: rgba(0, 132, 255, 0.12);
    }

    .chat-card-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #c2d7ff;
      display: grid;
      place-items: center;
      color: var(--primary);
      font-weight: 700;
    }

    .chat-card-info {
      flex: 1;
      min-width: 0;
    }

    .chat-card-info h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-card-info p {
      margin: 0.35rem 0 0;
      font-size: 0.83rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chat-header {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .chat-header .contact-info {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .chat-header .contact-name {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .chat-header .contact-status {
      margin: 0.2rem 0 0;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .chat-header .actions {
      display: flex;
      gap: 0.75rem;
    }

    .action-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: #f4f7fb;
      color: var(--primary);
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .chat-window {
      flex: 1;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      overflow-y: hidden;
      background: linear-gradient(180deg, #eff6ff 0%, #f8fbff 100%);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding-right: 0.5rem;
    }

    .message-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .message-row.me {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 68%;
      padding: 0.85rem 1rem;
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
      position: relative;
      word-break: break-word;
      font-size: 0.95rem;
    }

    .message-row.me .message-bubble {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
      border-bottom-left-radius: 18px;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
    }

    .message-row.other .message-bubble {
      border-bottom-left-radius: 4px;
    }

    .message-meta {
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .chat-input {
      border-top: 1px solid var(--border);
      padding: 0.9rem 1rem;
      background: #f8fbff;
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .chat-input textarea {
      flex: 1;
      border: 1px solid #dbe7f4;
      border-radius: 999px;
      padding: 0.9rem 1.1rem;
      resize: none;
      height: 48px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      background: white;
    }

    .chat-input button {
      border: none;
      background: var(--primary);
      color: white;
      padding: 0 20px;
      min-width: 110px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        order: 2;
      }
      .chat-panel {
        order: 1;
      }
    }
  .hidden {
      display: none;
    }

    .login-screen {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .login-panel {
      width: min(420px, 100%);
      background: var(--surface);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }

    .login-panel h2 {
      margin: 0 0 0.5rem;
      font-size: 1.55rem;
      color: var(--text);
    }

    .login-panel p {
      margin: 0 0 1.75rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .login-panel label {
      display: block;
      margin-bottom: 1rem;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .login-panel input {
      width: 100%;
      padding: 0.95rem 1rem;
      margin-top: 0.4rem;
      border: 1px solid #dbe7f4;
      border-radius: 16px;
      background: #f8fbff;
      font-size: 0.95rem;
      outline: none;
    }

    .login-panel button {
      width: 100%;
      margin-top: 0.5rem;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 999px;
      padding: 0.95rem 1.2rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .login-error {
      color: #d93025;
      margin-top: 0.75rem;
      font-size: 0.91rem;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-panel">
      <h2>Đăng nhập Zalo Chat</h2>
      <p>Vui lòng đăng nhập để bắt đầu trò chuyện với Hỗ trợ Zalo.</p>

      <form id="loginForm">
        <label>
          Tên đăng nhập
          <input id="username" type="text" required placeholder="admin" />
        </label>
        <label>
          Mật khẩu
          <input id="password" type="password" required placeholder="password" />
        </label>
        <button type="submit">Đăng nhập</button>
        <div class="login-error" id="loginError"></div>
      </form>

      <p style="margin-top:1.5rem;color:var(--muted);font-size:0.9rem;">Demo: <strong>admin</strong> / <strong>password</strong></p>
    </div>
  </div>

  <div class="app hidden" id="chatApp">
    <section class="sidebar">
      <div class="sidebar-header">
        <div class="avatar">Z</div>
        <div>
          <div class="title">Zalo Chat</div>
          <div class="subtitle">Đăng nhập thành công</div>
        </div>
      </div>
      <div class="chat-list">
        <article class="chat-card active">
          <div class="chat-card-avatar">H</div>
          <div class="chat-card-info">
            <h3>Hỗ trợ Zalo</h3>
            <p>Gửi tin nhắn để bắt đầu chat</p>
          </div>
        </article>
      </div>
    </section>

    <section class="chat-panel">
      <header class="chat-header">
        <div class="contact-info">
          <div class="chat-card-avatar">H</div>
          <div>
            <h1 class="contact-name">Hỗ trợ Zalo</h1>
            <p class="contact-status">Đang hoạt động</p>
          </div>
        </div>
        <div class="actions">
          <button class="action-btn" id="logoutButton">⇦</button>
          <button class="action-btn">⋯</button>
        </div>
      </header>

      <div class="chat-window">
        <div id="messages" class="messages"></div>
      </div>

      <form id="form" class="chat-input">
        <textarea id="message" autocomplete="off" placeholder="Nhập tin nhắn..." rows="1"></textarea>
        <button type="submit">Gửi</button>
      </form>
    </section>
  </div>

  <script>
    const loginScreen = document.getElementById('loginScreen');
    const chatApp = document.getElementById('chatApp');
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginError = document.getElementById('loginError');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('message');
    const form = document.getElementById('form');
    const logoutButton = document.getElementById('logoutButton');

    const baseUrl = window.location.protocol === 'file:' ? 'http://localhost:8080' : window.location.origin;
    const loginEndpoint = `${baseUrl}/login`;

    let username = '';
    let token = '';
    let ws = null;

    loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      loginError.textContent = '';
      const user = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (!user || !password) {
        loginError.textContent = 'Vui lòng nhập đủ thông tin.';
        return;
      }

      try {
        const response = await fetch(loginEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password }),
        });

        if (!response.ok) {
          const payload = await response.json();
          loginError.textContent = payload.error || 'Đăng nhập thất bại.';
          return;
        }

        const data = await response.json();
        token = data.token;
        username = user;
        loginScreen.classList.add('hidden');
        chatApp.classList.remove('hidden');
        initWebSocket();
      } catch (error) {
        loginError.textContent = 'Không thể kết nối tới server. Hãy mở trang bằng http://localhost:8080';
      }
    });

    logoutButton.addEventListener('click', () => {
      username = '';
      token = '';
      if (ws) {
        ws.close();
        ws = null;
      }
      messagesEl.innerHTML = '';
      loginScreen.classList.remove('hidden');
      chatApp.classList.add('hidden');
    });

    form.addEventListener('submit', event => {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message || !ws || ws.readyState !== WebSocket.OPEN) {
        return;
      }
      ws.send(JSON.stringify({ sender: username, message }));
      messageInput.value = '';
    });

    function initWebSocket() {
      const isFileProtocol = window.location.protocol === 'file:';
      const wsHost = isFileProtocol ? 'localhost:8080' : window.location.host;
      const protocol = isFileProtocol || window.location.protocol === 'http:' ? 'ws' : 'wss';
      ws = new WebSocket(`${protocol}://${wsHost}/ws?token=${encodeURIComponent(token)}`);

      ws.addEventListener('open', () => {
        appendMessage('Hệ thống', 'Kết nối WebSocket thành công.', false);
      });

      ws.addEventListener('message', event => {
        let payload;
        try {
          payload = JSON.parse(event.data);
        } catch (err) {
          payload = { sender: 'unknown', message: event.data, sentAt: new Date().toISOString() };
        }
        appendMessage(payload.sender, payload.message, payload.sender === username, payload.sentAt);
      });

      ws.addEventListener('close', () => {
        appendMessage('Hệ thống', 'Mất kết nối với server.', false);
      });

      ws.addEventListener('error', () => {
        loginError.textContent = 'Kết nối WebSocket bị lỗi.';
      });
    }

    function appendMessage(sender, message, isMe, sentAt) {
      const date = sentAt ? new Date(sentAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const row = document.createElement('div');
      row.className = `message-row ${isMe ? 'me' : 'other'}`;

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = `<div>${message}</div><div class="message-meta">${sender} · ${date}</div>`;

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  </script>
</body>
</html>
